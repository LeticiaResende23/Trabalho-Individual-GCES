services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      NODE_ENV: production
      PORT: 55555
      PGHOST: db
      PGPORT: 5432
      PGUSER: mkjs
      PGPASSWORD: mkjs
      PGDATABASE: mkjs
    expose:
      - "55555"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mkjs
      POSTGRES_PASSWORD: mkjs
      POSTGRES_DB: mkjs
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mkjs -d mkjs"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  prod_pgdata:
