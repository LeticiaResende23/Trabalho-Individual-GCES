services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - "55555:55555"
    environment:
      PORT: 55555
      PGHOST: db
      PGPORT: 5432
      PGUSER: mkjs
      PGPASSWORD: mkjs
      PGDATABASE: mkjs
    volumes:
      - ./server:/app/server
      - ./game:/app/game
      - app_node_modules:/app/server/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mkjs
      POSTGRES_PASSWORD: mkjs
      POSTGRES_DB: mkjs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mkjs -d mkjs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app_node_modules:
  pgdata: