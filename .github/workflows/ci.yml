name: CI - Build and Lint

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint frontend and backend
        run: npm run lint

      - name: Build frontend and backend checks
        run: npm run build

      - name: Run tests
        run: npm test