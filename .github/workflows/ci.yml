name: CI - Build and Lint

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Lint frontend and backend
        run: npm run lint

      - name: Build frontend and backend checks
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: SonarCloud token missing
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "::warning::SONAR_TOKEN is not configured. Add it as a GitHub Actions secret to enable SonarCloud analysis."

      - name: SonarCloud Quality Gate
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: Setup Node.js for CodeQL
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies for analysis
        run: npm ci --include=dev

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v2
